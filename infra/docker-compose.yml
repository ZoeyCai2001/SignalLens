services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: signallens-postgres
    environment:
      POSTGRES_DB: signallens
      POSTGRES_USER: signallens
      POSTGRES_PASSWORD: signallens
    ports:
      - "5432:5432"
    volumes:
      - signallens-postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signallens -d signallens"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: signallens-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  signallens-postgres-data:
